<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA v2.0 - Enterprise AI Orchestrator</title>
    <style>
        :root {
            --bg-base: #09090b;
            --bg-panel: #18181b;
            --border: #27272a;
            --text: #e4e4e7;
            --muted: #a1a1aa;
            --primary: #0ea5e9;
            --accent: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --glass: rgba(24, 24, 27, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation */
        nav {
            height: 60px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            justify-content: space-between;
        }

        .logo {
            font-weight: 800;
            font-size: 20px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-bar {
            display: flex;
            gap: 20px;
            font-size: 13px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge.warning {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border-color: rgba(245, 158, 11, 0.2);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 10px currentColor;
        }

        /* Main Layout */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left Sidebar - Terminal */
        .terminal-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: var(--bg-base);
        }

        .panel-header {
            padding: 12px 20px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
            display: flex;
            justify-content: space-between;
        }

        .terminal-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        .line {
            margin-bottom: 8px;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        .prompt::before {
            content: 'NOVA❯ ';
            color: var(--primary);
            font-weight: bold;
        }

        .user::before {
            content: 'User❯ ';
            color: var(--muted);
        }

        .think-block {
            margin: 10px 0 10px 20px;
            padding: 10px 15px;
            border-left: 3px solid var(--accent);
            color: var(--muted);
            font-size: 13px;
            background: rgba(139, 92, 246, 0.05);
            border-radius: 0 8px 8px 0;
        }

        .tool-call {
            margin: 10px 0;
            padding: 12px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--primary);
        }

        .tool-result {
            color: var(--success);
            margin-top: 5px;
            font-size: 13px;
        }

        .terminal-input {
            padding: 20px;
            border-top: 1px solid var(--border);
            background: var(--bg-panel);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .terminal-input input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 14px;
            font-family: 'JetBrains Mono', Consolas, monospace;
            outline: none;
        }

        /* Right Sidebar - Visualizer */
        .visualizer-panel {
            width: 450px;
            display: flex;
            flex-direction: column;
            background: var(--bg-panel);
        }

        .browser-preview {
            flex: 1;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .browser-header {
            padding: 10px;
            background: #202124;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .browser-dots {
            display: flex;
            gap: 6px;
        }

        .b-dot { width: 10px; height: 10px; border-radius: 50%; }
        .b-dot.r { background: #ff5f56; }
        .b-dot.y { background: #ffbd2e; }
        .b-dot.g { background: #27c93f; }

        .browser-url {
            flex: 1;
            background: #171717;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: var(--muted);
            text-align: center;
        }

        .browser-window {
            flex: 1;
            background: #ffffff;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .browser-window img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.2;
        }

        .browser-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: pulse 2s infinite;
        }

        .sequential-thinking {
            height: 300px;
            padding: 20px;
            overflow-y: auto;
        }

        .st-node {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .st-line {
            width: 2px;
            background: var(--border);
            position: relative;
            margin-left: 7px;
        }

        .st-dot {
            position: absolute;
            top: 0;
            left: -4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .st-content {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            flex: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(14, 165, 233, 0); }
            100% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0); }
        }

    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
            NOVA Studio v2.0
        </div>
        <div class="status-bar">
            <div class="badge"><div class="dot"></div> glm-4.6:cloud</div>
            <div class="badge"><div class="dot"></div> C:\Project\App</div>
            <div class="badge warning"><div class="dot"></div> Agent Mode</div>
        </div>
    </nav>

    <main>
        <div class="terminal-panel">
            <div class="panel-header">
                <span>Orchestration Terminal</span>
                <span>CPU: 12% | RAM: 1.2GB</span>
            </div>
            <div class="terminal-content" id="terminal">
                <!-- Lines added via JS -->
            </div>
            <div class="terminal-input">
                <span style="color: var(--primary); font-weight: bold;">NOVA❯</span>
                <input type="text" value="/agent Create a modern dashboard and test it in browser" disabled>
            </div>
        </div>

        <div class="visualizer-panel">
            <div class="browser-preview">
                <div class="panel-header">
                    <span>Browser Autopilot</span>
                    <span style="color: var(--primary);">● Live</span>
                </div>
                <div class="browser-header">
                    <div class="browser-dots">
                        <div class="b-dot r"></div>
                        <div class="b-dot y"></div>
                        <div class="b-dot g"></div>
                    </div>
                    <div class="browser-url" id="browserUrl">http://localhost:3000</div>
                </div>
                <div class="browser-window">
                    <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=800&q=80" alt="Dashboard" id="browserImg">
                    <div class="browser-overlay" id="browserAction">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        Initializing Puppeteer...
                    </div>
                </div>
            </div>

            <div class="sequential-thinking">
                <div class="panel-header" style="margin: -20px -20px 20px -20px;">
                    <span>Sequential Thinking Matrix</span>
                </div>
                <div id="st-container">
                    <!-- Nodes added via JS -->
                </div>
            </div>
        </div>
    </main>

    <script>
        const terminal = document.getElementById('terminal');
        const stContainer = document.getElementById('st-container');
        const browserAction = document.getElementById('browserAction');
        const browserUrl = document.getElementById('browserUrl');
        
        const delay = ms => new Promise(res => setTimeout(res, ms));

        function addTerminalLine(html) {
            const div = document.createElement('div');
            div.className = 'line';
            div.innerHTML = html;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function addSTNode(thought, branch = false) {
            const div = document.createElement('div');
            div.className = 'st-node';
            div.innerHTML = `
                <div class="st-line"><div class="st-dot" ${branch ? 'style="background:var(--warning);"' : ''}></div></div>
                <div class="st-content">
                    <strong style="color: ${branch ? 'var(--warning)' : 'var(--accent)'}">${branch ? 'Branch/Revision' : 'Thought'}</strong><br>
                    ${thought}
                </div>
            `;
            stContainer.appendChild(div);
            stContainer.scrollTop = stContainer.scrollHeight;
        }

        async function runSimulation() {
            await delay(1000);
            addTerminalLine('<span class="user">/agent Create a modern dashboard and test it in browser</span>');
            
            await delay(1000);
            addSTNode('Goal: Create a dashboard, serve it, and test it via Puppeteer.');
            addTerminalLine('<div class="think-block">🧠 Thinking...<br>I need to generate the HTML/CSS, write a simple Express server to host it, and then use the browser_navigate and browser_screenshot tools to verify.</div>');

            await delay(1500);
            addTerminalLine('<div class="tool-call">⚙️ tool: <b>file_write</b>(path: "src/dashboard.html", content: "...")<br><span class="tool-result">✔ Written 145 lines</span></div>');
            addSTNode('Dashboard UI created. Now I need a server.');

            await delay(1500);
            addTerminalLine('<div class="tool-call">⚙️ tool: <b>command_run</b>(command: "npm install express")<br><span class="tool-result">✔ Exit code: 0</span></div>');

            await delay(1000);
            addTerminalLine('<div class="tool-call">⚙️ tool: <b>file_write</b>(path: "server.js", content: "...")<br><span class="tool-result">✔ Server script created</span></div>');

            await delay(1000);
            addSTNode('Starting server on port 3000 in background...', true);
            addTerminalLine('<div class="tool-call">⚙️ tool: <b>command_run</b>(command: "node server.js")<br><span class="tool-result">⏳ Background task started (ID: 124)</span></div>');

            await delay(2000);
            addSTNode('Server running. Taking control of Browser Autopilot.');
            addTerminalLine('<div class="think-block">🧠 Testing UI... Opening browser via Puppeteer.</div>');
            
            // Browser Interaction Simulation
            browserAction.innerHTML = 'Navigating to localhost:3000...';
            addTerminalLine('<div class="tool-call">⚙️ tool: <b>browser_navigate</b>(url: "http://localhost:3000")</div>');
            
            await delay(1500);
            document.getElementById('browserImg').style.opacity = '1';
            browserAction.innerHTML = '<span style="color:var(--success)">✔ Page Loaded</span>';
            addTerminalLine('<div style="color:var(--success)">✔ Navigated to: http://localhost:3000<br>Page title: Analytics Dashboard</div>');

            await delay(1500);
            addSTNode('Verifying interactive elements.');
            browserAction.innerHTML = 'Clicking #export-btn...';
            addTerminalLine('<div class="tool-call">⚙️ tool: <b>browser_click</b>(selector: "#export-btn")</div>');

            await delay(1000);
            browserAction.innerHTML = '<span style="color:var(--success)">✔ Click Registered</span>';
            addTerminalLine('<div style="color:var(--success)">✔ Clicked: #export-btn</div>');

            await delay(1500);
            addTerminalLine('<div class="tool-call">⚙️ tool: <b>browser_screenshot</b>(filename: "dashboard_test.png")</div>');
            browserAction.innerHTML = '📸 Capturing Screenshot...';

            await delay(1000);
            browserAction.innerHTML = 'Browser Session Complete';
            addTerminalLine('<div style="color:var(--success)">✔ Screenshot saved: dashboard_test.png</div>');

            await delay(1000);
            addSTNode('All tests passed. Task complete.');
            addTerminalLine('<br><span class="prompt"></span> I have successfully built the dashboard, deployed the local server, and verified the UI using the headless browser. The screenshot is saved in your directory.');
        }

        runSimulation();
    </script>
</body>
</html>
